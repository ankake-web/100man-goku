<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カタン</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="home"></div>
  <h1 id="game-title" style="display:none">🎲 カタン</h1>
  <div id="app" style="display:none">
    <div id="game-nav"></div>
    <!-- 盤面を四隅パネルの位置決めコンテキストにするためのラッパー -->
    <div id="board-area">
      <!-- viewBox を 800x700 から対称クロップ(余白削減)してタイルを相対的に拡大。
           中心(400,350)は不変。タイル/頂点/辺/港/盗賊の座標・判定は不変。 -->
      <svg id="board" width="800" height="700" viewBox="24 21 752 658"></svg>
    </div>
    <div id="ui"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
