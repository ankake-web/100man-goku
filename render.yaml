# ============================================================
# render.yaml — オンライン対戦サーバ（WebSocket）の Render デプロイ定義
# ============================================================
#
# このファイルは「対戦サーバ」だけをデプロイする（クライアントは GitHub Pages 配信）。
# Render ダッシュボードの Blueprint からこのリポジトリを指すと自動で読み込まれる。
#
# 仕組み:
#   - Node の Web Service として起動（npm start = tsx server/index.ts）。
#   - Render が注入する PORT で listen し、パス /lan で WebSocket を待ち受ける。
#   - ヘルスチェックは GET /health（server/index.ts が 200 を返す）。
#
# デプロイ後にやること（ダッシュボード側）:
#   1. ALLOWED_ORIGINS に GitHub Pages のオリジンを設定（例 https://<user>.github.io）。
#      ※ オリジンはスキーム+ホストのみ。パス（/catan）は含めない。
#   2. 払い出された公開 URL（https://catan-xxxx.onrender.com）を控える。
#      → クライアント側ビルドの VITE_LAN_SERVER_URL に wss:// 形で渡す。

services:
  - type: web
    name: catan-lan-server
    runtime: node
    plan: free                 # 無料枠（一定時間アクセスが無いとスリープ→初回アクセスで復帰）
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # 接続を許可する Origin（カンマ区切り）。本番は GitHub Pages のオリジンを設定する。
      # 例: https://<github-user>.github.io
      - key: ALLOWED_ORIGINS
        sync: false            # 値はダッシュボードで設定（リポジトリにコミットしない）
      # PORT は Render が自動注入するため、ここで指定しない。
      - key: NODE_VERSION
        value: "20"
