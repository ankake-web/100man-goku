name: Deploy to GitHub Pages

# main に push されるたびにビルドして GitHub Pages へデプロイする。
# 手動実行も可能（Actions タブの "Run workflow"）。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages デプロイ（OIDC）に必要な権限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走るデプロイは1つに絞る（進行中のものはキャンセルしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # オンライン対戦サーバ（Render）の接続先。リポジトリの
          # Settings → Secrets and variables → Actions → Variables に
          # VITE_LAN_SERVER_URL = wss://<app>.onrender.com を登録すると焼き込まれる。
          # 未設定なら同一オリジン接続のまま（オンライン対戦は無効）。
          VITE_LAN_SERVER_URL: ${{ vars.VITE_LAN_SERVER_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
